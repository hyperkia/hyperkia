<svg
  width="24"
  height="24"
  viewBox="0 0 24 24"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Outer rectangle -->
  <rect
    x="2"
    y="2"
    width="20"
    height="20"
    fill="none"
    stroke="currentColor"
    stroke-width="1"
  />

  <!-- Inner rectangle (2px smaller on each side) -->
  <rect
    x="5"
    y="5"
    width="14"
    height="14"
    fill="none"
    stroke="currentColor"
    stroke-width="1"
  />
</svg>
